      el.innerHTML = '<div style="background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:12px;">Đang lưu vào Google Sheets...</div>';
    } else if (!state.storageOk){
      el.innerHTML = '<div style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:12px;">Lỗi kết nối tới Google Sheets — thay đổi gần nhất có thể chưa được lưu. Kiểm tra mạng và thử lại.</div>';
    } else {
      el.innerHTML = '<div style="background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:12px;">Đã đồng bộ với Google Sheets — mọi người dùng chung link đều xem và sửa được dữ liệu này.</div>';
    }
  }

  function nextId(){
    var maxId = 0;
    state.data.forEach(function(r){ if (r.id > maxId) maxId = r.id; });
    return maxId + 1;
  }

  function uniqueDepts(){
    var set = {};
    state.data.forEach(function(r){ if (r.dept) set[r.dept] = true; });
    return Object.keys(set).sort(function(a,b){ return a.localeCompare(b); });
  }

  function filteredData(){
    var q = state.search.trim().toLowerCase();
    return state.data.filter(function(r){
      if (state.dept && r.dept !== state.dept) return false;
      if (state.edr && edrStatus(r.edr) !== state.edr) return false;
      if (state.type && (r.type || 'PC') !== state.type) return false;
      if (!q) return true;
      var hay = [r.dept, r.name, r.hostname, r.ip, r.serial, r.model, r.note, r.mac, r.type].join(' ').toLowerCase();
      return hay.indexOf(q) !== -1;
    });
  }

  function esc(s){
    return (s === undefined || s === null) ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function displayNoMap(){
    var map = {};
    state.data.forEach(function(r, i){ map[r.id] = i + 1; });
    return map;
  }

  function nextNo(){
    var maxNo = 0;
    state.data.forEach(function(r){ var n = Number(r.no); if (!isNaN(n) && n > maxNo) maxNo = n; });
    return maxNo + 1;
  }

  function emptyRecord(){
    return { id: nextId(), no: nextNo(), dept: '', name: '', note: '', hostname: '', serial: '', model: '', os: '', mac: '', ip: '', cpu: '', mem: '', disk: '', edr: '', type: 'PC' };
  }

    var rows = filteredData();

    html += '<div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">';

    html += '<div class="stat-card"><div class="stat-num">' + depts.length + '</div><div class="stat-label">Phòng ban</div></div>';

    rows.forEach(function(r){
      var isConfirm = state.deleteConfirmId === r.id;
      var es = edrStatus(r.edr);
      var edrBadge = es === 'yes'
        ? '<span class="badge" style="background:#dcfce7; color:#15803d;">Đã cài</span>'
        : (es === 'no'
          ? '<span class="badge" style="background:#fee2e2; color:#b91c1c;">Chưa cài</span>'
          : '<span class="muted">—</span>');
      var typ = r.type || 'PC';
      var tc = typeColors[typ] || typeColors['KHAC'];
      var typeBadge = '<span class="badge" style="background:' + tc[0] + '; color:' + tc[1] + ';">' + (DEVICE_TYPE_LABELS[typ] || typ) + '</span>';
      html += '<tr' + (state.selected[r.id] ? ' style="background:#f5f3ff;"' : '') + '>';
      html += '<td><input type="checkbox" class="row-cb" data-id="' + r.id + '"' + (state.selected[r.id] ? ' checked' : '') + ' /></td>';
      html += '<td>' + noMap[r.id] + '</td>';
      html += '<td>' + (r.dept ? '<span class="badge">' + esc(r.dept) + '</span>' : '<span class="muted">—</span>') + '</td>';
      html += '<td>' + (r.name ? esc(r.name) : '<span class="muted">—</span>') + '</td>';
      html += '<td>' + typeBadge + '</td>';
      html += '<td>' + (r.hostname ? esc(r.hostname) : '<span class="muted">—</span>') + '</td>';
      html += '<td>' + (r.ip ? esc(r.ip) : '<span class="muted">—</span>') + '</td>';
      html += '<td>' + edrBadge + '</td>';
      html += '<td>' + (r.note ? esc(r.note) : '<span class="muted">—</span>') + '</td>';
      if (isConfirm){
        html += '<td style="white-space:nowrap;"><span style="font-size:12px; color:#b91c1c; margin-right:6px;">Xóa?</span>' +
          '<button class="icon-btn confirm-del-btn" data-id="' + r.id + '" title="Xác nhận xóa">✔</button>' +

    document.getElementById('search-input').addEventListener('input', function(e){

    document.getElementById('edr-filter').addEventListener('change', function(e){

      render();
    });
    document.getElementById('type-filter').addEventListener('change', function(e){
      state.type = e.target.value;
      render();
    });
    document.getElementById('add-btn').addEventListener('click', function(){

    document.getElementById('export-btn').addEventListener('click', function(){

    });
    document.getElementById('import-btn').addEventListener('click', function(){

      var file = e.target.files && e.target.files[0];
      if (file) importFromExcel(file);

    });
    document.getElementById('reload-btn').addEventListener('click', function(){
      if (!gasConfigured()){ alert('Chưa cấu hình Google Sheets (GAS_URL).'); return; }
      fetch(GAS_URL, { method: 'GET' })
        .then(function(res){ return res.json(); })
        .then(function(res){
          if (res && res.data){
            state.data = res.data;
            state.storageOk = true;
            state.lastSync = new Date();
          }
          render();
        })
        .catch(function(){ state.storageOk = false; updateSyncStatus(); });
    });

    var selectAllCb = document.getElementById('select-all-cb');
    if (selectAllCb){
      selectAllCb.addEventListener('change', function(e){

      });

    body.querySelectorAll('.row-cb').forEach(function(cb){
      cb.addEventListener('change', function(e){

    var bulkApplyBtn = document.getElementById('bulk-apply-dept-btn');
    if (bulkApplyBtn){
      bulkApplyBtn.addEventListener('click', function(){

          if (!val) return;
        }
        state.data = state.data.map(function(r){
          return state.selected[r.id] ? Object.assign({}, r, { dept: val }) : r;
        });
        persist();

          return state.selected[r.id] ? Object.assign({}, r, { type: val }) : r;

        persist();
        render();

    var bulkDeleteBtn = document.getElementById('bulk-delete-btn');
    if (bulkDeleteBtn){

    if (bulkDeleteCancelBtn){

    var bulkDeleteConfirmBtn = document.getElementById('bulk-delete-confirm-btn');

      bulkDeleteConfirmBtn.addEventListener('click', function(){
        state.data = state.data.filter(function(r){ return !state.selected[r.id]; });

        persist();
        render();

        state.bulkDeleteConfirm = false;
        render();
      });
    }
    body.querySelectorAll('.edit-btn').forEach(function(btn){
      btn.addEventListener('click', function(){

        if (rec) openEditModal(rec, false);

  // Ánh xạ tiêu đề cột trong file Excel (không phân biệt hoa/thường) sang tên trường dữ liệu
  var IMPORT_HEADER_MAP = {
    'stt': 'no', 'no': 'no',
    'phòng ban': 'dept', 'phong ban': 'dept', 'dept': 'dept', 'phòng': 'dept',
    'tên nhân viên / thiết bị': 'name', 'ten nhan vien / thiet bi': 'name', 'tên': 'name', 'ten': 'name', 'name': 'name', 'nhân viên / thiết bị': 'name',
    'loại thiết bị': 'type', 'loai thiet bi': 'type', 'type': 'type', 'loại': 'type',
    'ghi chú': 'note', 'ghi chu': 'note', 'note': 'note',
    'hostname': 'hostname',
    'serial number': 'serial', 'serial': 'serial',
    'model': 'model',
    'os version': 'os', 'os': 'os',
    'lan mac': 'mac', 'mac': 'mac',
    'ip lan': 'ip', 'ip': 'ip',
    'cpu': 'cpu',
    'mem': 'mem', 'ram': 'mem',
    'disk': 'disk',
    'edr': 'edr'
  };

  function importFromExcel(file){
    if (typeof XLSX === 'undefined'){
      alert('Chưa tải được thư viện Excel, vui lòng thử lại.');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e){
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, { type: 'array' });
        var wsname = wb.SheetNames[0];
        var ws = wb.Sheets[wsname];
        var jsonRows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (!jsonRows.length){
          alert('File Excel không có dữ liệu.');
          return;
        }
        var keyMap = {};
        Object.keys(jsonRows[0]).forEach(function(h){
          var norm = h.toString().trim().toLowerCase();
          if (IMPORT_HEADER_MAP[norm]) keyMap[h] = IMPORT_HEADER_MAP[norm];
        });
        if (Object.keys(keyMap).length === 0){
          alert('Không nhận diện được cột nào trong file.\n\nHãy đặt tên cột giống file Excel xuất mẫu, ví dụ: "Phòng ban", "Tên nhân viên / thiết bị", "Loại thiết bị", "Hostname", "IP LAN", "Serial number"...');
          return;
        }
        var maxId = state.data.reduce(function(m, r){ return Math.max(m, r.id || 0); }, 0);
        var maxNo = state.data.reduce(function(m, r){ return Math.max(m, r.no || 0); }, 0);
        var added = 0;
        jsonRows.forEach(function(row){
          var obj = { dept: '', name: '', note: '', hostname: '', serial: '', model: '', os: '', mac: '', ip: '', cpu: '', mem: '', disk: '', edr: '', type: 'PC' };
          Object.keys(keyMap).forEach(function(h){
            var v = row[h];
            obj[keyMap[h]] = (v !== undefined && v !== null) ? String(v).trim() : '';
          });
          if (!obj.name && !obj.hostname) return; // bỏ qua dòng trống
          obj.id = ++maxId;
          obj.no = ++maxNo;
          if (obj.type) obj.type = obj.type.toString().trim().toUpperCase();
          if (!obj.type) obj.type = 'PC';
          state.data.push(obj);
          added++;
        });
        if (added === 0){
          alert('Không có dòng thiết bị hợp lệ nào để nhập (cần ít nhất cột Tên hoặc Hostname).');
          return;
        }
        persist();
        render();
        alert('Đã nhập thêm ' + added + ' thiết bị từ file Excel.');
      } catch (err){
        alert('Không đọc được file Excel. Vui lòng kiểm tra lại định dạng file (.xlsx hoặc .xls).');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function exportToExcel(rows){
    if (typeof XLSX === 'undefined'){
      alert('Không thể tải thư viện xuất Excel. Vui lòng kiểm tra kết nối mạng và thử lại.');
      return;
    }
    var headers = ['STT','Phòng ban','Tên nhân viên / thiết bị','Loại thiết bị','Ghi chú','Hostname','Serial number','Model','OS Version','LAN MAC','IP LAN','CPU','MEM','DISK','EDR'];
    var aoa = [headers];
    var noMap = displayNoMap();
    rows.forEach(function(r){
      aoa.push([noMap[r.id], r.dept, r.name, DEVICE_TYPE_LABELS[r.type] || r.type || '', r.note, r.hostname, r.serial, r.model, r.os, r.mac, r.ip, r.cpu, r.mem, r.disk, r.edr]);
    });
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = headers.map(function(h){ return { wch: Math.max(12, h.length + 2) }; });
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Thiet bi');
    var today = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, 'danh-sach-thiet-bi-' + today + '.xlsx');
  }

        '<div class="grid2">' +
          deptField(record.dept) +
          field('name', 'Tên nhân viên / thiết bị', record.name) +
          typeField(record.type) +
          field('hostname', 'Hostname', record.hostname) +
          field('ip', 'IP LAN', record.ip) +
          field('serial', 'Serial number', record.serial) +
          field('model', 'Model', record.model) +
          field('os', 'OS Version', record.os) +
          field('mac', 'LAN MAC', record.mac) +
          field('cpu', 'CPU', record.cpu) +
          field('mem', 'MEM', record.mem) +
          field('disk', 'DISK', record.disk) +
          field('edr', 'EDR', record.edr) +
        '</div>' +
        '<div class="field-row">' + field('note', 'Ghi chú', record.note, true) + '</div>' +
        '<div style="display:flex; justify-content:flex-end; gap:8px; margin-top:8px;">' +
          '<button id="modal-cancel">Hủy</button>' +
          '<button class="primary" id="modal-save">Lưu</button>' +
        '</div>' +
      '</div>';
    document.getElementById('app-root').appendChild(overlay);

    function field(key, label, value, full){
      return '<div class="field-row" style="' + (full ? 'grid-column: 1 / -1;' : '') + '">' +
        '<label class="field-label">' + label + '</label>' +
        '<input data-key="' + key + '" value="' + esc(value) + '" style="width:100%;" />' +
        '</div>';
    }

    function typeField(value){
      var norm = (value || '').toString().trim().toUpperCase();
      var types = getAllTypes();
      if (norm && types.indexOf(norm) === -1) types = types.concat([norm]);
      var opts = types.map(function(t){
        return '<option value="' + t + '"' + (norm === t ? ' selected' : '') + '>' + typeLabel(t) + '</option>';
      }).join('');
      opts += '<option value="__custom__">+ Tạo loại thiết bị mới...</option>';
      return '<div class="field-row">' +
        '<label class="field-label">Loại thiết bị</label>' +
        '<select data-key="type" id="type-select-field" style="width:100%;">' + opts + '</select>' +
        '</div>';
    }

    function deptField(value){
      var depts = uniqueDepts();
      if (value && depts.indexOf(value) === -1) depts = depts.concat([value]);
      depts.sort(function(a,b){ return a.localeCompare(b); });
      var opts = '<option value=""' + (!value ? ' selected' : '') + '>— Chọn phòng ban —</option>';
      opts += depts.map(function(d){
        return '<option value="' + esc(d) + '"' + (value === d ? ' selected' : '') + '>' + esc(d) + '</option>';
      }).join('');
      opts += '<option value="__custom__">+ Nhập phòng ban mới...</option>';
      return '<div class="field-row">' +
        '<label class="field-label">Phòng ban</label>' +
        '<select data-key="dept" id="dept-select-field" style="width:100%;">' + opts + '</select>' +
        '</div>';
    }

    overlay.querySelector('#modal-cancel').addEventListener('click', function(){
      overlay.remove();
    });
    var deptSelect = overlay.querySelector('#dept-select-field');
    if (deptSelect){
      deptSelect.addEventListener('change', function(e){
        if (e.target.value === '__custom__'){
          var val = prompt('Nhập tên phòng ban mới:');
          if (val && val.trim()){
            var opt = document.createElement('option');
            opt.value = val.trim();
            opt.textContent = val.trim();
            opt.selected = true;
            deptSelect.insertBefore(opt, deptSelect.querySelector('option[value="__custom__"]'));
          } else {
            deptSelect.value = record.dept || '';
          }
        }
      });
    }
    var typeSelect = overlay.querySelector('#type-select-field');
    if (typeSelect){
      typeSelect.addEventListener('change', function(e){
        if (e.target.value === '__custom__'){
          var val = prompt('Nhập tên loại thiết bị mới (ví dụ: SWITCH, CAMERA, MAY CHAM CONG...):');
          if (val && val.trim()){
            var newType = val.trim().toUpperCase();
            var opt = document.createElement('option');
            opt.value = newType;
            opt.textContent = newType;
            opt.selected = true;
            typeSelect.insertBefore(opt, typeSelect.querySelector('option[value="__custom__"]'));
          } else {
            typeSelect.value = (record.type || 'PC').toString().trim().toUpperCase();
          }
        }
      });
    }
    overlay.addEventListener('click', function(e){
      if (e.target === overlay) overlay.remove();
    });
    overlay.querySelector('#modal-save').addEventListener('click', function(){
      var inputs = overlay.querySelectorAll('input[data-key], select[data-key]');
      var updated = Object.assign({}, record);
      inputs.forEach(function(inp){
        updated[inp.getAttribute('data-key')] = inp.value;
      });
      if (isNew){
        state.data.push(updated);
      } else {
        state.data = state.data.map(function(r){ return r.id === updated.id ? updated : r; });
      }
      persist();
      overlay.remove();
      render();
    });
  }

  loadData();
})();
</script>
